<!DOCTYPE html>
<html lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>iMovie - Register</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
        <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script>
            function register(){
                var account = $('#account').val();
                var password = $('#password').val();
                var confirmPassword = $('#confirmPassword').val();
                var nickName = $('#nickName').val();
                var gender = $('input[name="gender"]:checked').val();
                var email = $('#email').val();

                if (password !== confirmPassword) {
                    $('#message').text("Passwords do not match");
                    $('#errorDlg').modal({backdrop: 'static', keyboard: false});
                    return;
                }

                var data = {
                    account: $('#account').val(),
                    password: password,
                    nickName: $('#nickName').val(),
                    gender: $('input[name="gender"]:checked').val(),
                    email: $('#email').val(),
                    phone: $('#phone').val()
                };

                axios({
                    method: 'post',
                    url: '/api/auth/register',
                    data: data
                }).then(function(response){
                    console.log(response);
                    window.localStorage.setItem("token", response.data.token);
                    window.localStorage.setItem("user", JSON.stringify(response.data.user));
                    alert("Register success!");
                    window.location.href = "scheduleList.html";
                }).catch(function(error){
                    console.log(error);
                    var msg = "Register failed";
                    if (error.response && error.response.data) {
                        if (error.response.data.details) {
                            // Extract field-level validation errors
                            var errors = [];
                            $.each(error.response.data.details, function(field, message) {
                                errors.push(field + ": " + message);
                            });
                            msg = errors.join("\n");
                        } else if (error.response.data.error) {
                            msg = error.response.data.error;
                        }
                    }
                    $('#message').text(msg);
                    $('#errorDlg').modal({backdrop: 'static', keyboard: false});
                });
            }
        </script>
    </head>
    <body>
        <div class="container" style="margin-top:50px;">
            <div class="row">
                <div class="col-md-6 col-md-offset-3">
                    <div class="panel panel-default">
                        <div class="panel-heading"><h3 class="panel-title">iMovie Register</h3></div>
                        <div class="panel-body">
                            <div class="form-group">
                                <label>Account</label>
                                <input type="text" class="form-control" id="account" placeholder="3-20 characters">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" class="form-control" id="password" placeholder="6-20 characters">
                            </div>
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter password">
                            </div>
                            <div class="form-group">
                                <label>Nickname</label>
                                <input type="text" class="form-control" id="nickName" placeholder="2-20 characters">
                            </div>
                            <div class="form-group">
                                <label>Gender</label><br>
                                <label class="radio-inline"><input type="radio" name="gender" value="M" checked> Male</label>
                                <label class="radio-inline"><input type="radio" name="gender" value="F"> Female</label>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" class="form-control" id="email" placeholder="your@email.com">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="text" class="form-control" id="phone" placeholder="Phone number">
                            </div>
                            <button class="btn btn-default" onclick="window.location.href='login.html'">Return</button>
                            <button class="btn btn-primary" onclick="register()">Register</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Modal -->
        <div class="modal fade" tabindex="-1" role="dialog" id="errorDlg">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                        <h4 class="modal-title">Error</h4>
                    </div>
                    <div class="modal-body">
                        <p id="message"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
