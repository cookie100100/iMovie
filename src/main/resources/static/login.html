<!DOCTYPE html>
<html lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>iMovie - Login</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
        <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script>
            $(document).ready(function(){
                // If already logged in, redirect
                if (window.localStorage.getItem("token")) {
                    window.location.href = "scheduleList.html";
                }
            });

            function login(){
                var account = $('#account').val();
                var password = $('#password').val();

                axios({
                    method: 'post',
                    url: '/api/auth/login',
                    data: { account: account, password: password }
                }).then(function(response){
                    console.log(response);
                    window.localStorage.setItem("token", response.data.token);
                    window.localStorage.setItem("user", JSON.stringify(response.data.user));
                    window.location.href = "scheduleList.html";
                }).catch(function(error){
                    console.log(error);
                    var msg = error.response ? (error.response.data.error || "Login failed") : "Cannot connect to server";
                    $('#message').text(msg);
                    $('#errorDlg').modal({backdrop: 'static', keyboard: false});
                });
            }

            function clearForm(){
                $('#account').val('');
                $('#password').val('');
            }
        </script>
    </head>
    <body>
        <div class="container" style="margin-top:100px;">
            <div class="row">
                <div class="col-md-4 col-md-offset-4">
                    <div class="panel panel-default">
                        <div class="panel-heading"><h3 class="panel-title">iMovie Login</h3></div>
                        <div class="panel-body">
                            <div class="form-group">
                                <label>Account</label>
                                <input type="text" class="form-control" id="account" placeholder="Enter account">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter password">
                            </div>
                            <button class="btn btn-primary" onclick="login()">Login</button>
                            <button class="btn btn-default" onclick="clearForm()">Clear</button>
                            <button class="btn btn-default" onclick="window.location.href='register.html'">Register</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Modal -->
        <div class="modal fade" tabindex="-1" role="dialog" id="errorDlg">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                        <h4 class="modal-title">Error</h4>
                    </div>
                    <div class="modal-body">
                        <p id="message"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
